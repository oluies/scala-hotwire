# Scala Steward configuration
# Reference: https://github.com/scala-steward-org/scala-steward/blob/main/docs/repo-specific-configuration.md

pullRequests.frequency = "7 days"

updates.limit = 5

commits.message = "${artifactName}: ${currentVersion} -> ${nextVersion}"

# Stay on the Scala 3 LTS line (3.3.x). Remove this pin to opt into 3.4+ PRs.
updates.pin = [
  { groupId = "org.scala-lang", artifactId = "scala3-library", version = "3.3." }
]
