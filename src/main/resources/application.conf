pekko {
  loglevel = "INFO"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  http.server {
    websocket.periodic-keep-alive-max-idle = 30s
    idle-timeout = 120s
  }
}

hotwire {
  host = "0.0.0.0"
  host = ${?HOST}
  port = 8080
  port = ${?PORT}

  secret = "dev-only-change-me-and-do-not-commit-real-secrets-here"
  secret = ${?HOTWIRE_SECRET}

  # Leave unset to use the in-process bus. Set to e.g. "nats://localhost:4222" to use NATS.
  nats-url = ${?NATS_URL}

  # Which demo(s) to mount. One of: all, chat, posts. Default: all.
  demo = "all"
  demo = ${?DEMO}
}
